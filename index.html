<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Shar AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --bg-secondary: #111;
            --bg-input: #181818;
            --text: #eee;
            --text-secondary: #888;
            --hint: #404040;
            --border: #262626;
            --accent: #3a7a9a;
            --button: #263a44;
            --button-text: #d0e4f0;
            --radius: 32px;
        }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 0;
            margin: 0;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            color: var(--text);
        }

        .chat-app {
            max-width: 420px;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px 10px 18px;
            background: var(--bg-secondary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            min-height: 56px;
            flex-shrink: 0;
            padding-top: env(safe-area-inset-top, 12px);
        }

        .header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header .logo .shark {
            font-size: 28px;
            width: 42px;
            height: 42px;
            background: var(--bg-input);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header .logo .title {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header .logo .title span {
            background: linear-gradient(135deg, #d0d0d0, #f5f5f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .logo .sub {
            font-size: 10px;
            color: var(--hint);
            font-weight: 500;
            margin-top: -2px;
        }

        .header .actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .header .actions button {
            background: none;
            border: none;
            color: var(--hint);
            font-size: 17px;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 10px;
            transition: 0.2s;
        }

        .header .actions button:hover {
            color: var(--text-secondary);
            background: var(--bg-input);
        }

        .header .actions .share-btn {
            background: var(--button);
            color: var(--button-text);
            border-radius: 30px;
            padding: 5px 12px;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: 'Inter', sans-serif;
        }

        .header .actions .share-btn:hover {
            opacity: 0.85;
        }

        .messages {
            flex: 1;
            padding: 12px 16px 8px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .messages::-webkit-scrollbar {
            width: 3px;
        }
        .messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .msg {
            display: flex;
            gap: 8px;
            align-items: flex-start;
            animation: fadeIn 0.25s ease;
            max-width: 100%;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(6px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            background: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 18px;
            overflow: hidden;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bubble {
            background: var(--bg-input);
            padding: 8px 14px;
            border-radius: 16px 16px 16px 4px;
            color: var(--text);
            font-size: 14px;
            line-height: 1.5;
            max-width: 82%;
            border: 1px solid rgba(255, 255, 255, 0.02);
            word-break: break-word;
        }

        .bubble img {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 4px;
        }

        .msg.user {
            flex-direction: row-reverse;
        }

        .msg.user .bubble {
            background: var(--button);
            border-radius: 16px 16px 4px 16px;
            color: var(--button-text);
        }

        .time {
            font-size: 10px;
            color: var(--hint);
            margin-top: 3px;
            opacity: 0.6;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 200px;
            color: var(--hint);
            text-align: center;
            gap: 8px;
        }

        .empty-state .big-shark {
            font-size: 48px;
            opacity: 0.3;
        }
        .empty-state p {
            font-size: 14px;
            color: var(--hint);
            font-weight: 500;
        }
        .empty-state span {
            font-size: 12px;
            color: var(--hint);
            opacity: 0.5;
        }

        .input-area {
            padding: 8px 16px 14px 16px;
            background: var(--bg-secondary);
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom, 14px);
        }

        .input-wrap {
            background: var(--bg-input);
            border-radius: 40px;
            display: flex;
            align-items: center;
            padding: 3px 3px 3px 16px;
            border: 1px solid var(--border);
            transition: 0.15s;
        }

        .input-wrap:focus-within {
            border-color: var(--accent);
        }

        .input-wrap input {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 14px;
            padding: 10px 0;
            flex: 1;
            outline: none;
            font-family: 'Inter', sans-serif;
            min-width: 0;
        }

        .input-wrap input::placeholder {
            color: var(--hint);
        }

        .input-wrap button {
            background: transparent;
            border: none;
            color: var(--hint);
            width: 38px;
            height: 38px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .input-wrap button:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .input-wrap .send {
            background: var(--button);
            color: var(--button-text);
            width: 42px;
            height: 42px;
            font-size: 18px;
            cursor: pointer;
        }

        .input-wrap .send:hover {
            opacity: 0.85;
        }

        .input-wrap .send:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .features {
            display: flex;
            gap: 6px;
            padding: 8px 0 2px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .feature-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 4px 14px;
            color: var(--hint);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .feature-btn:hover {
            background: var(--bg-input);
            border-color: var(--accent);
            color: var(--text-secondary);
        }

        .feature-btn i {
            font-size: 12px;
            color: var(--accent);
        }

        .water {
            text-align: center;
            font-size: 9px;
            color: var(--hint);
            padding-top: 4px;
            letter-spacing: 1.5px;
            opacity: 0.3;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing span {
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 10px;
            animation: pulse 1.4s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.3;
                transform: scale(0.9);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
                background: var(--accent);
            }
        }

        .file-input {
            display: none;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            justify-content: flex-start;
        }

        .sidebar-overlay.open {
            display: flex;
        }

        .sidebar {
            width: 300px;
            max-width: 80%;
            height: 100%;
            background: var(--bg-secondary);
            padding: 20px 16px;
            overflow-y: auto;
            border-right: 1px solid var(--border);
            animation: slideIn 0.25s ease;
        }

        @keyframes slideIn {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(0);
            }
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h3 {
            color: var(--text);
            font-size: 17px;
            font-weight: 600;
        }

        .sidebar-header button {
            background: none;
            border: none;
            color: var(--hint);
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
        }

        .sidebar-header button:hover {
            color: var(--text-secondary);
        }

        .chat-list-item {
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 3px;
            border: 1px solid transparent;
        }

        .chat-list-item:hover {
            background: var(--bg-input);
            border-color: var(--border);
        }

        .chat-list-item.active {
            background: var(--button);
            border-color: var(--accent);
        }

        .chat-list-item .chat-title {
            color: var(--text);
            font-size: 13px;
            font-weight: 500;
        }

        .chat-list-item .chat-preview {
            color: var(--hint);
            font-size: 11px;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-list-item .chat-time {
            color: var(--hint);
            font-size: 10px;
            margin-top: 2px;
            opacity: 0.5;
        }

        .chat-list-item .chat-delete {
            float: right;
            color: var(--hint);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 13px;
            padding: 2px 6px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .chat-list-item .chat-delete:hover {
            color: #aa4444;
            background: rgba(170, 68, 68, 0.1);
        }

        .new-chat-btn {
            width: 100%;
            padding: 10px;
            background: var(--button);
            border: 1px solid var(--accent);
            border-radius: 12px;
            color: var(--button-text);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .new-chat-btn:hover {
            opacity: 0.85;
        }

        .empty-chats {
            color: var(--hint);
            text-align: center;
            padding: 30px 0;
            font-size: 13px;
            opacity: 0.5;
        }

        @media (max-width: 420px) {
            .header .logo .title {
                font-size: 16px;
            }
            .header .logo .shark {
                font-size: 24px;
                width: 38px;
                height: 38px;
            }
            .bubble {
                font-size: 13px;
                padding: 7px 12px;
            }
        }

        @media (min-width: 421px) {
            .chat-app {
                border-radius: var(--radius);
                height: 95vh;
                height: 95dvh;
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.02);
            }
            body {
                padding: 16px;
            }
        }

        @media (max-width: 420px) {
            .chat-app {
                border-radius: 0;
                height: 100vh;
                height: 100dvh;
            }
            body {
                padding: 0;
            }
        }
    </style>
</head>
<body>

    <div class="chat-app" id="app">
        <!-- Шапка -->
        <div class="header">
            <div class="logo">
                <div class="shark">🦈</div>
                <div>
                    <div class="title"><span>Shar AI</span></div>
                    <div class="sub">акула</div>
                </div>
            </div>
            <div class="actions">
                <button id="shareBtn" class="share-btn" title="Поделиться">
                    <i class="fas fa-share-alt"></i> Поделиться
                </button>
                <button id="sidebarToggle" title="История"><i class="fas fa-history"></i></button>
                <button id="newChatBtn" title="Новый чат"><i class="fas fa-plus"></i></button>
            </div>
        </div>

        <!-- Сообщения -->
        <div class="messages" id="messages">
            <div class="empty-state" id="emptyState">
                <div class="big-shark">🦈</div>
                <p>Напишите что-нибудь</p>
                <span>Shar AI ответит</span>
            </div>
        </div>

        <!-- Ввод -->
        <div class="input-area">
            <div class="input-wrap">
                <input type="text" id="input" placeholder="Спроси Shar AI..." autocomplete="off" />
                <button id="attachBtn"><i class="fas fa-image"></i></button>
                <button class="send" id="sendBtn"><i class="fas fa-arrow-up"></i></button>
            </div>

            <div class="features">
                <button class="feature-btn" data-text="Привет!"><i class="fas fa-hand-peace"></i> Привет</button>
                <button class="feature-btn" data-text="Расскажи о себе"><i class="fas fa-shark"></i> О себе</button>
                <button class="feature-btn" data-text="Помоги с кодом"><i class="fas fa-code"></i> Код</button>
                <button class="feature-btn" data-text="Что нового?"><i class="fas fa-newspaper"></i> Новое</button>
            </div>

            <div class="water">SHAR AI</div>
        </div>

        <input type="file" id="fileInput" class="file-input" accept="image/*" multiple />
    </div>

    <!-- Сайдбар -->
    <div class="sidebar-overlay" id="sidebarOverlay">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-history" style="color:var(--accent); margin-right:8px;"></i>История</h3>
                <button id="closeSidebar"><i class="fas fa-times"></i></button>
            </div>
            <button class="new-chat-btn" id="newChatFromSidebar">
                <i class="fas fa-plus"></i> Новый чат
            </button>
            <div id="chatList"></div>
        </div>
    </div>

    <script>
        // ===== API =====
        const API_KEY = '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';
        const API_URL = 'https://openrouter.ai/api/v1/chat/completions';

        // ===== DOM =====
        const messagesContainer = document.getElementById('messages');
        const emptyState = document.getElementById('emptyState');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const fileInput = document.getElementById('fileInput');
        const attachBtn = document.getElementById('attachBtn');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const chatList = document.getElementById('chatList');

        let currentChatId = null;
        let chats = {};
        let isProcessing = false;

        // ===== Работа с чатами =====
        function loadAllChats() {
            try {
                const saved = localStorage.getItem('sharAI_chats');
                if (saved) chats = JSON.parse(saved);
                else chats = {};
            } catch (e) { chats = {}; }
        }

        function saveAllChats() {
            try { localStorage.setItem('sharAI_chats', JSON.stringify(chats)); } catch (e) {}
        }

        function createNewChat() {
            const id = 'chat_' + Date.now();
            const now = new Date().toISOString();
            chats[id] = { id, title: 'Новый чат', messages: [], created: now, updated: now };
            saveAllChats();
            return id;
        }

        function loadChat(chatId) {
            if (!chats[chatId]) chatId = createNewChat();
            currentChatId = chatId;
            const chat = chats[chatId];

            messagesContainer.innerHTML = '';
            if (chat.messages.length === 0) {
                messagesContainer.appendChild(emptyState);
                emptyState.style.display = 'flex';
            } else {
                emptyState.style.display = 'none';
                chat.messages.forEach(msg => addMessageToUI(msg.text, msg.isUser, msg.image));
            }
            updateChatList();
            saveAllChats();
            input.focus();
        }

        function addMessageToUI(text, isUser, image = null) {
            if (emptyState) emptyState.style.display = 'none';

            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${isUser ? 'user' : ''}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            if (isUser) {
                avatar.innerHTML = '<i class="fas fa-user" style="font-size:15px; color:var(--hint);"></i>';
            } else {
                avatar.textContent = '🦈';
            }

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            let content = text;
            if (image) content += `<br><img src="${image}" alt="photo" />`;
            bubble.innerHTML = content;

            const time = document.createElement('div');
            time.className = 'time';
            const now = new Date();
            time.textContent = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

            bubble.appendChild(time);
            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addMessage(text, isUser, image = null) {
            addMessageToUI(text, isUser, image);
            if (currentChatId && chats[currentChatId]) {
                const chat = chats[currentChatId];
                chat.messages.push({ text, isUser, image, time: new Date().toISOString() });
                chat.updated = new Date().toISOString();
                if (isUser && chat.title === 'Новый чат' && text.length > 0) {
                    chat.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
                }
                saveAllChats();
                updateChatList();
            }
        }

        function addTypingIndicator() {
            const existing = document.getElementById('typingIndicator');
            if (existing) existing.remove();

            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            msgDiv.id = 'typingIndicator';

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = '🦈';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // ===== API =====
        async function sendToAI(message) {
            try {
                const history = (chats[currentChatId]?.messages || [])
                    .filter(m => !m.image)
                    .slice(-20)
                    .map(m => ({ role: m.isUser ? 'user' : 'assistant', content: m.text }));

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`,
                        'HTTP-Referer': window.location.origin,
                        'X-Title': 'Shar AI'
                    },
                    body: JSON.stringify({
                        model: 'openai/gpt-3.5-turbo',
                        messages: [
                            { role: 'system', content: 'Ты Shar AI — акула-помощник. Отвечай кратко и по делу.' },
                            ...history,
                            { role: 'user', content: message }
                        ],
                        max_tokens: 500,
                        temperature: 0.7
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `Ошибка ${response.status}`);
                }

                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error('API Error:', error);
                return `⚠️ Ошибка: ${error.message}`;
            }
        }

        // ===== ОТПРАВКА СООБЩЕНИЯ — ГЛАВНАЯ ФУНКЦИЯ =====
        async function handleSend() {
            // Защита от дублирования
            if (isProcessing) {
                console.log('Уже обрабатывается');
                return;
            }

            const text = input.value.trim();
            if (!text) {
                console.log('Пустое сообщение');
                return;
            }

            console.log('Отправка:', text);

            isProcessing = true;
            sendBtn.disabled = true;
            input.disabled = true;

            // Создаём чат если его нет
            if (!currentChatId || !chats[currentChatId]) {
                currentChatId = createNewChat();
                loadChat(currentChatId);
            }

            // Добавляем сообщение пользователя
            addMessage(text, true);

            // Показываем печать
            addTypingIndicator();

            try {
                const reply = await sendToAI(text);
                removeTypingIndicator();
                addMessage(reply, false);
            } catch (error) {
                removeTypingIndicator();
                addMessage(`⚠️ Ошибка: ${error.message}`, false);
            }

            // Разблокируем
            isProcessing = false;
            sendBtn.disabled = false;
            input.disabled = false;
            input.value = '';
            input.focus();
        }

        // ===== Фото =====
        function handleFiles(files) {
            if (isProcessing) return;

            if (!currentChatId || !chats[currentChatId]) {
                currentChatId = createNewChat();
                loadChat(currentChatId);
            }

            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imageData = e.target.result;
                    addMessage('📷 Фото', true, imageData);
                    sendPhotoToAI(imageData);
                };
                reader.readAsDataURL(file);
            });
        }

        async function sendPhotoToAI(imageData) {
            if (isProcessing) return;
            isProcessing = true;

            addTypingIndicator();
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`,
                        'HTTP-Referer': window.location.origin,
                        'X-Title': 'Shar AI'
                    },
                    body: JSON.stringify({
                        model: 'openai/gpt-4o-mini',
                        messages: [
                            { role: 'system', content: 'Ты Shar AI — акула-помощник. Опиши что видишь на фото кратко.' },
                            { role: 'user', content: [
                                    { type: 'text', text: 'Опиши что на этом фото' },
                                    { type: 'image_url', image_url: { url: imageData } }
                                ] }
                        ],
                        max_tokens: 300
                    })
                });

                if (!response.ok) throw new Error(`Ошибка ${response.status}`);
                const data = await response.json();
                const reply = data.choices[0].message.content;
                removeTypingIndicator();
                addMessage(reply, false);
            } catch (error) {
                removeTypingIndicator();
                addMessage(`⚠️ Ошибка описания фото: ${error.message}`, false);
            }
            isProcessing = false;
        }

        // ===== Список чатов =====
        function updateChatList() {
            const chatIds = Object.keys(chats);
            if (chatIds.length === 0) {
                chatList.innerHTML = '<div class="empty-chats">Нет чатов. Создайте новый!</div>';
                return;
            }

            chatIds.sort((a, b) => new Date(chats[b].updated) - new Date(chats[a].updated));

            chatList.innerHTML = '';
            chatIds.forEach(id => {
                const chat = chats[id];
                const div = document.createElement('div');
                div.className = `chat-list-item ${id === currentChatId ? 'active' : ''}`;
                const preview = chat.messages.length > 0 ?
                    chat.messages[chat.messages.length - 1].text.slice(0, 40) + '...' :
                    'Пустой чат';

                const date = new Date(chat.updated);
                const timeStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                div.innerHTML = `
                            <div class="chat-title">${chat.title || 'Новый чат'}</div>
                            <div class="chat-preview">${preview}</div>
                            <div class="chat-time">${timeStr}</div>
                            <button class="chat-delete" data-id="${id}"><i class="fas fa-trash-alt"></i></button>
                        `;

                div.addEventListener('click', (e) => {
                    if (e.target.closest('.chat-delete')) return;
                    closeSidebar();
                    loadChat(id);
                });

                const deleteBtn = div.querySelector('.chat-delete');
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm('Удалить этот чат?')) deleteChat(id);
                });

                chatList.appendChild(div);
            });
        }

        function deleteChat(chatId) {
            delete chats[chatId];
            saveAllChats();
            const chatIds = Object.keys(chats);
            if (chatIds.length === 0) {
                const newId = createNewChat();
                loadChat(newId);
            } else {
                loadChat(chatIds[0]);
            }
            updateChatList();
        }

        // ===== Сайдбар =====
        function openSidebar() { sidebarOverlay.classList.add('open');
            updateChatList(); }

        function closeSidebar() { sidebarOverlay.classList.remove('open'); }

        // ===== Поделиться =====
        document.getElementById('shareBtn').addEventListener('click', () => {
            const chat = chats[currentChatId];
            if (!chat || chat.messages.length === 0) {
                alert('Нет сообщений для отправки');
                return;
            }

            let text = `🦈 Shar AI — чат "${chat.title}"\n\n`;
            const lastMessages = chat.messages.slice(-10);
            lastMessages.forEach(msg => {
                const prefix = msg.isUser ? '👤' : '🦈';
                text += `${prefix} ${msg.text}\n`;
            });
            text += `\n📱 Shar AI`;

            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Текст скопирован в буфер обмена!');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('✅ Текст скопирован!');
            });
        });

        // ===== Инициализация =====
        function init() {
            loadAllChats();
            const chatIds = Object.keys(chats);
            if (chatIds.length === 0) {
                const newId = createNewChat();
                loadChat(newId);
            } else {
                chatIds.sort((a, b) => new Date(chats[b].updated) - new Date(chats[a].updated));
                loadChat(chatIds[0]);
            }

            // ===== ОБРАБОТЧИКИ =====
            // Кнопка отправки — ПРЯМОЕ НАЗНАЧЕНИЕ
            sendBtn.addEventListener('click', function(e) {
                e.preventDefault();
                console.log('Клик по sendBtn');
                handleSend();
            });

            // Enter
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    console.log('Enter нажат');
                    handleSend();
                }
            });

            // Фишки
            document.querySelectorAll('.feature-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    input.value = this.dataset.text;
                    handleSend();
                });
            });

            // Фото
            attachBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFiles(e.target.files);
                    fileInput.value = '';
                }
            });

            // Сайдбар
            document.getElementById('sidebarToggle').addEventListener('click', openSidebar);
            document.getElementById('closeSidebar').addEventListener('click', closeSidebar);
            sidebarOverlay.addEventListener('click', (e) => {
                if (e.target === sidebarOverlay) closeSidebar();
            });

            document.getElementById('newChatBtn').addEventListener('click', () => {
                const newId = createNewChat();
                loadChat(newId);
                closeSidebar();
            });

            document.getElementById('newChatFromSidebar').addEventListener('click', () => {
                const newId = createNewChat();
                loadChat(newId);
                closeSidebar();
            });

            console.log('Shar AI готов к работе!');
        }

        // Запуск
        init();
    </script>

</body>
</html>
