<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Shark AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --bg-secondary: #111;
            --bg-input: #181818;
            --text: #eee;
            --hint: #404040;
            --border: #262626;
            --accent: #3a7a9a;
            --button: #263a44;
            --button-text: #d0e4f0;
            --bubble-user: #1e2a30;
            --bubble-bot: #181818;
        }

        body {
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            color: var(--text);
            padding: 0;
            margin: 0;
        }

        .chat-app {
            max-width: 420px;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .header .logo { display: flex; align-items: center; gap: 10px; }
        .header .logo .shark { font-size: 26px; width: 40px; height: 40px; background: var(--bg-input); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .header .logo .title { font-size: 17px; font-weight: 700; }
        .header .logo .title span { background: linear-gradient(135deg, #d0d0d0, #f5f5f5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .header .logo .sub { font-size: 9px; color: var(--hint); font-weight: 500; margin-top: -2px; }

        .header .actions { display: flex; gap: 2px; align-items: center; }
        .header .actions button { background: none; border: none; color: var(--hint); font-size: 16px; cursor: pointer; padding: 6px 8px; border-radius: 10px; transition: 0.2s; }
        .header .actions button:hover { color: var(--text); background: var(--bg-input); }

        .messages {
            flex: 1;
            padding: 10px 14px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .messages::-webkit-scrollbar { width: 3px; }
        .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .msg { display: flex; gap: 8px; align-items: flex-start; animation: fadeIn 0.25s ease; max-width: 100%; }
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(6px); } 100% { opacity: 1; transform: translateY(0); } }

        .avatar { width: 30px; height: 30px; border-radius: 10px; background: var(--bg-input); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 17px; overflow: hidden; }

        .bubble {
            background: var(--bubble-bot);
            padding: 8px 14px;
            border-radius: 14px 14px 14px 4px;
            color: var(--text);
            font-size: 13.5px;
            line-height: 1.5;
            max-width: 82%;
            border: 1px solid var(--border);
            word-break: break-word;
        }
        .bubble code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 12px; font-family: monospace; color: var(--accent); }
        .bubble pre { background: var(--bg); padding: 8px; border-radius: 8px; overflow-x: auto; margin: 6px 0; font-size: 12px; font-family: monospace; color: var(--text); border: 1px solid var(--border); }
        .bubble img { max-width: 100%; border-radius: 8px; margin-top: 4px; }

        .msg.user { flex-direction: row-reverse; }
        .msg.user .bubble { background: var(--bubble-user); border-radius: 14px 14px 4px 14px; color: var(--button-text); }

        .time { font-size: 9px; color: var(--hint); margin-top: 3px; opacity: 0.5; display: flex; align-items: center; gap: 8px; justify-content: flex-end; }

        .copy-btn { background: none; border: none; color: var(--hint); font-size: 12px; cursor: pointer; padding: 2px 6px; border-radius: 4px; transition: 0.2s; opacity: 0.5; }
        .copy-btn:hover { background: var(--bg-input); opacity: 1; color: var(--text); }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 180px;
            color: var(--hint);
            text-align: center;
            gap: 6px;
        }
        .empty-state .big-shark { font-size: 44px; opacity: 0.3; }
        .empty-state p { font-size: 13px; color: var(--hint); font-weight: 500; }
        .empty-state span { font-size: 11px; color: var(--hint); opacity: 0.5; }

        .input-area {
            padding: 6px 14px 12px 14px;
            background: var(--bg-secondary);
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom, 12px);
        }

        .input-wrap {
            background: var(--bg-input);
            border-radius: 40px;
            display: flex;
            align-items: center;
            padding: 3px 3px 3px 14px;
            border: 1px solid var(--border);
            transition: 0.15s;
        }
        .input-wrap:focus-within { border-color: var(--accent); }

        .input-wrap input {
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 13.5px;
            padding: 9px 0;
            flex: 1;
            outline: none;
            font-family: 'Inter', sans-serif;
            min-width: 0;
        }
        .input-wrap input::placeholder { color: var(--hint); }

        .input-wrap button {
            background: transparent;
            border: none;
            color: var(--hint);
            width: 36px;
            height: 36px;
            border-radius: 30px;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .input-wrap button:hover { background: rgba(255, 255, 255, 0.05); }
        .input-wrap .send { background: var(--button); color: var(--button-text); width: 40px; height: 40px; font-size: 17px; }
        .input-wrap .send:hover { opacity: 0.85; }
        .input-wrap .send:disabled { opacity: 0.3; cursor: not-allowed; }

        .file-input { display: none; }

        .suggestions {
            display: flex;
            gap: 6px;
            padding: 6px 0 2px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .suggestion-btn {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 4px 12px;
            color: var(--hint);
            font-size: 10.5px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .suggestion-btn:hover { border-color: var(--accent); color: var(--text); }

        .water { text-align: center; font-size: 8px; color: var(--hint); padding-top: 3px; letter-spacing: 1.5px; opacity: 0.3; }

        .typing { display: flex; gap: 4px; padding: 4px 0; }
        .typing span { width: 6px; height: 6px; background: var(--accent); border-radius: 10px; animation: pulse 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } }

        .sidebar-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            justify-content: flex-start;
        }
        .sidebar-overlay.open { display: flex; }

        .sidebar {
            width: 280px;
            max-width: 80%;
            height: 100%;
            background: var(--bg-secondary);
            padding: 16px 14px;
            overflow-y: auto;
            border-right: 1px solid var(--border);
            animation: slideIn 0.25s ease;
        }
        @keyframes slideIn { 0% { transform: translateX(-100%); } 100% { transform: translateX(0); } }

        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
        .sidebar-header h3 { color: var(--text); font-size: 16px; font-weight: 600; }
        .sidebar-header button { background: none; border: none; color: var(--hint); font-size: 18px; cursor: pointer; transition: 0.2s; }
        .sidebar-header button:hover { color: var(--text); }

        .chat-list-item {
            padding: 8px 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 2px;
            border: 1px solid transparent;
        }
        .chat-list-item:hover { background: var(--bg-input); border-color: var(--border); }
        .chat-list-item.active { background: var(--button); border-color: var(--accent); }
        .chat-list-item .chat-title { color: var(--text); font-size: 12.5px; font-weight: 500; }
        .chat-list-item .chat-preview { color: var(--hint); font-size: 10.5px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-list-item .chat-time { color: var(--hint); font-size: 9px; margin-top: 2px; opacity: 0.5; }
        .chat-list-item .chat-delete { float: right; color: var(--hint); background: none; border: none; cursor: pointer; font-size: 12px; padding: 2px 6px; border-radius: 6px; transition: 0.2s; }
        .chat-list-item .chat-delete:hover { color: #aa4444; background: rgba(170, 68, 68, 0.1); }

        .new-chat-btn {
            width: 100%;
            padding: 8px;
            background: var(--button);
            border: 1px solid var(--accent);
            border-radius: 10px;
            color: var(--button-text);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 10px;
        }
        .new-chat-btn:hover { opacity: 0.85; }

        .empty-chats { color: var(--hint); text-align: center; padding: 20px 0; font-size: 12px; opacity: 0.5; }

        .light-theme {
            --bg: #f0f0f0;
            --bg-secondary: #ffffff;
            --bg-input: #e8e8e8;
            --text: #1a1a1a;
            --hint: #888;
            --border: #d0d0d0;
            --accent: #3a7a9a;
            --button: #d0e4f0;
            --button-text: #1a2a30;
            --bubble-user: #d0e4f0;
            --bubble-bot: #f5f5f5;
        }

        @media (max-width: 420px) {
            .header .logo .title { font-size: 15px; }
            .header .logo .shark { font-size: 22px; width: 36px; height: 36px; }
            .bubble { font-size: 12.5px; padding: 6px 12px; }
        }

        @media (min-width: 421px) {
            .chat-app {
                border-radius: 32px;
                height: 95vh;
                height: 95dvh;
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 0 1px rgba(255, 255, 255, 0.02);
            }
            body { padding: 16px; }
        }

        @media (max-width: 420px) {
            .chat-app { border-radius: 0; height: 100vh; height: 100dvh; }
            body { padding: 0; }
        }
    </style>
</head>
<body>

    <div class="chat-app" id="app">
        <div class="header">
            <div class="logo">
                <div class="shark">🦈</div>
                <div>
                    <div class="title"><span>Shark AI</span></div>
                    <div class="sub">акула</div>
                </div>
            </div>
            <div class="actions">
                <button id="themeToggle" title="Сменить тему"><i class="fas fa-moon"></i></button>
                <button id="sidebarToggle" title="История"><i class="fas fa-history"></i></button>
                <button id="newChatBtn" title="Новый чат"><i class="fas fa-plus"></i></button>
            </div>
        </div>

        <div class="messages" id="messages">
            <div class="empty-state" id="emptyState">
                <div class="big-shark">🦈</div>
                <p>Напишите что-нибудь</p>
                <span>Shark AI ответит</span>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrap">
                <input type="text" id="input" placeholder="Спроси Shark AI..." autocomplete="off" />
                <button id="fileBtn"><i class="fas fa-paperclip"></i></button>
                <button class="send" id="sendBtn"><i class="fas fa-arrow-up"></i></button>
            </div>

            <div class="suggestions" id="suggestions">
                <button class="suggestion-btn" data-text="Напиши код для калькулятора">💻 Код</button>
                <button class="suggestion-btn" data-text="Что нового в мире ИИ?">🌐 Новости</button>
                <button class="suggestion-btn" data-text="Помоги с английским переводом">📝 Перевод</button>
                <button class="suggestion-btn" data-text="Расскажи анекдот">😂 Анекдот</button>
            </div>

            <div class="water">SHARK AI</div>
        </div>

        <input type="file" id="fileInput" class="file-input" accept=".pdf,.txt,.docx,text/plain" multiple />
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h3><i class="fas fa-history" style="color:var(--accent); margin-right:6px;"></i>История</h3>
                <button id="closeSidebar"><i class="fas fa-times"></i></button>
            </div>
            <button class="new-chat-btn" id="newChatFromSidebar"><i class="fas fa-plus"></i> Новый чат</button>
            <div id="chatList"></div>
        </div>
    </div>

    <script>
        // ===== API =====
        const API_KEY = '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';
        const API_URL = 'https://openrouter.ai/api/v1/chat/completions';
        const MODEL = 'deepseek/deepseek-chat';

        // ===== DOM =====
        const messagesContainer = document.getElementById('messages');
        const emptyState = document.getElementById('emptyState');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const fileInput = document.getElementById('fileInput');
        const fileBtn = document.getElementById('fileBtn');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const chatList = document.getElementById('chatList');
        const themeToggle = document.getElementById('themeToggle');

        let currentChatId = null;
        let chats = {};
        let isProcessing = false;

        // ===== ТЕМА =====
        function toggleTheme() {
            document.body.classList.toggle('light-theme');
            const icon = themeToggle.querySelector('i');
            icon.className = document.body.classList.contains('light-theme') ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('sharkAI_theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
        }

        function loadTheme() {
            if (localStorage.getItem('sharkAI_theme') === 'light') {
                document.body.classList.add('light-theme');
                themeToggle.querySelector('i').className = 'fas fa-sun';
            }
        }
        themeToggle.addEventListener('click', toggleTheme);

        // ===== ЧАТЫ =====
        function loadAllChats() {
            try {
                const saved = localStorage.getItem('sharkAI_chats');
                chats = saved ? JSON.parse(saved) : {};
            } catch (e) { chats = {}; }
        }

        function saveAllChats() {
            try { localStorage.setItem('sharkAI_chats', JSON.stringify(chats)); } catch (e) {}
        }

        function createNewChat() {
            const id = 'chat_' + Date.now();
            chats[id] = { id, title: 'Новый чат', messages: [], created: new Date().toISOString(), updated: new Date().toISOString() };
            saveAllChats();
            return id;
        }

        function loadChat(chatId) {
            if (!chats[chatId]) chatId = createNewChat();
            currentChatId = chatId;
            const chat = chats[chatId];

            messagesContainer.innerHTML = '';
            if (chat.messages.length === 0) {
                messagesContainer.appendChild(emptyState);
                emptyState.style.display = 'flex';
            } else {
                emptyState.style.display = 'none';
                chat.messages.forEach(msg => addMessageToUI(msg.text, msg.isUser, msg.image));
            }
            updateChatList();
            input.focus();
        }

        function addMessageToUI(text, isUser, image = null) {
            if (emptyState) emptyState.style.display = 'none';

            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${isUser ? 'user' : ''}`;

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = isUser ? '<i class="fas fa-user" style="font-size:14px; color:var(--hint);"></i>' : '🦈';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';

            let content = text;
            if (image) content += `<br><img src="${image}" alt="photo" />`;
            content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
            content = content.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
            content = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            content = content.replace(/\n/g, '<br />');
            bubble.innerHTML = content;

            const time = document.createElement('div');
            time.className = 'time';
            const now = new Date();
            time.textContent = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

            if (!isUser) {
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.innerHTML = '<i class="fas fa-copy"></i>';
                copyBtn.title = 'Копировать ответ';
                copyBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    navigator.clipboard.writeText(text).then(() => {
                        this.innerHTML = '✅';
                        setTimeout(() => { this.innerHTML = '<i class="fas fa-copy"></i>'; }, 1500);
                    });
                });
                time.appendChild(copyBtn);
            }

            bubble.appendChild(time);
            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addMessage(text, isUser, image = null) {
            addMessageToUI(text, isUser, image);
            if (currentChatId && chats[currentChatId]) {
                const chat = chats[currentChatId];
                chat.messages.push({ text, isUser, image, time: new Date().toISOString() });
                chat.updated = new Date().toISOString();
                if (isUser && chat.title === 'Новый чат' && text.length > 0) {
                    chat.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
                }
                saveAllChats();
                updateChatList();
            }
        }

        function addTypingIndicator() {
            const existing = document.getElementById('typingIndicator');
            if (existing) existing.remove();

            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            msgDiv.id = 'typingIndicator';

            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = '🦈';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;

            msgDiv.appendChild(avatar);
            msgDiv.appendChild(bubble);
            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // ===== API =====
        async function sendToAI(message) {
            try {
                const history = (chats[currentChatId]?.messages || [])
                    .filter(m => !m.image)
                    .slice(-20)
                    .map(m => ({ role: m.isUser ? 'user' : 'assistant', content: m.text }));

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`,
                        'HTTP-Referer': window.location.origin,
                        'X-Title': 'Shark AI'
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            { role: 'system', content: 'Ты Shark AI — акула-помощник. Отвечай на русском, помогай с кодом.' },
                            ...history,
                            { role: 'user', content: message }
                        ],
                        max_tokens: 500,
                        temperature: 0.7
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `Ошибка ${response.status}`);
                }

                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error('API Error:', error);
                return `⚠️ Ошибка: ${error.message}`;
            }
        }

        // ===== ОТПРАВКА =====
        async function handleSend() {
            if (isProcessing) return;
            const text = input.value.trim();
            if (!text) return;

            isProcessing = true;
            sendBtn.disabled = true;
            input.disabled = true;

            if (!currentChatId || !chats[currentChatId]) {
                currentChatId = createNewChat();
                loadChat(currentChatId);
            }

            addMessage(text, true);
            addTypingIndicator();

            try {
                const reply = await sendToAI(text);
                removeTypingIndicator();
                addMessage(reply, false);
            } catch (error) {
                removeTypingIndicator();
                addMessage(`⚠️ Ошибка: ${error.message}`, false);
            }

            isProcessing = false;
            sendBtn.disabled = false;
            input.disabled = false;
            input.value = '';
            input.focus();
        }

        // ===== ФАЙЛЫ =====
        function handleFiles(files) {
            if (isProcessing) return;
            if (!currentChatId || !chats[currentChatId]) {
                currentChatId = createNewChat();
                loadChat(currentChatId);
            }

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    let content = e.target.result;
                    if (file.type === 'application/pdf' || file.name.endsWith('.docx')) {
                        addMessage(`📄 ${file.name} загружен`, true);
                        sendToAI(`Я загрузил файл ${file.name}. Расскажи что с ним можно сделать.`).then(reply => addMessage(reply, false));
                        return;
                    }
                    if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
                        content = content;
                    } else {
                        content = 'Файл: ' + file.name;
                    }

                    if (content && content.length > 0) {
                        const preview = content.slice(0, 500) + (content.length > 500 ? '...' : '');
                        addMessage(`📎 Файл: ${file.name}\n\n${preview}`, true);
                        sendToAI(`Содержимое файла "${file.name}":\n${content.slice(0, 3000)}`).then(reply => addMessage(reply, false));
                    }
                };
                if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
                    reader.readAsText(file);
                } else {
                    reader.readAsDataURL(file);
                }
            });
        }

        // ===== СПИСОК ЧАТОВ =====
        function updateChatList() {
            const chatIds = Object.keys(chats);
            if (chatIds.length === 0) {
                chatList.innerHTML = '<div class="empty-chats">Нет чатов. Создайте новый!</div>';
                return;
            }

            chatIds.sort((a, b) => new Date(chats[b].updated) - new Date(chats[a].updated));

            chatList.innerHTML = '';
            chatIds.forEach(id => {
                const chat = chats[id];
                const div = document.createElement('div');
                div.className = `chat-list-item ${id === currentChatId ? 'active' : ''}`;
                const preview = chat.messages.length > 0 ? chat.messages[chat.messages.length - 1].text.slice(0, 35) + '...' : 'Пустой чат';
                const date = new Date(chat.updated);
                const timeStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                div.innerHTML = `
                    <div class="chat-title">${chat.title || 'Новый чат'}</div>
                    <div class="chat-preview">${preview}</div>
                    <div class="chat-time">${timeStr}</div>
                    <button class="chat-delete" data-id="${id}"><i class="fas fa-trash-alt"></i></button>
                `;

                div.addEventListener('click', (e) => {
                    if (e.target.closest('.chat-delete')) return;
                    closeSidebar();
                    loadChat(id);
                });

                div.querySelector('.chat-delete').addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm('Удалить этот чат?')) {
                        delete chats[id];
                        saveAllChats();
                        const ids = Object.keys(chats);
                        loadChat(ids.length > 0 ? ids[0] : createNewChat());
                        updateChatList();
                    }
                });

                chatList.appendChild(div);
            });
        }

        // ===== САЙДБАР =====
        function openSidebar() { sidebarOverlay.classList.add('open');
            updateChatList(); }

        function closeSidebar() { sidebarOverlay.classList.remove('open'); }

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        function init() {
            loadTheme();
            loadAllChats();
            const chatIds = Object.keys(chats);
            loadChat(chatIds.length > 0 ? chatIds[0] : createNewChat());

            sendBtn.addEventListener('click', (e) => { e.preventDefault();
                handleSend(); });
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault();
                    handleSend(); } });

            document.querySelectorAll('.suggestion-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    input.value = this.dataset.text;
                    handleSend();
                });
            });

            fileBtn.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleFiles(e.target.files);
                    fileInput.value = '';
                }
            });

            document.getElementById('sidebarToggle').addEventListener('click', openSidebar);
            document.getElementById('closeSidebar').addEventListener('click', closeSidebar);
            sidebarOverlay.addEventListener('click', (e) => { if (e.target === sidebarOverlay) closeSidebar(); });

            document.getElementById('newChatBtn').addEventListener('click', () => {
                const newId = createNewChat();
                loadChat(newId);
                closeSidebar();
            });

            document.getElementById('newChatFromSidebar').addEventListener('click', () => {
                const newId = createNewChat();
                loadChat(newId);
                closeSidebar();
            });

            console.log('🦈 Shark AI готов!');
        }

        init();
    </script>

</body>
</html>
